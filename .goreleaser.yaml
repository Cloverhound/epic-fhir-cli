version: 2

builds:
  - binary: fhir-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
      - -X github.com/Cloverhound/epic-fhir-cli/cmd.Version={{.Version}}
      - -X github.com/Cloverhound/epic-fhir-cli/cmd.BuildDate={{.Date}}
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: "checksums.txt"

release:
  github:
    owner: Cloverhound
    name: epic-fhir-cli
  draft: false
  prerelease: auto
